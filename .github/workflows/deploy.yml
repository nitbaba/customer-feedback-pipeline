name: Secure Data Pipeline Deployment

on:
  push:
    branches:
      - main

# Core permission block required to request JWT tokens from AWS STS via OIDC
permissions:
  id-token: write
  contents: read

jobs:
  validate-and-test:
    name: Lint, Test, and Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11'
          cache: 'pip'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Install PySpark & Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pyspark

      - name: Lint Code Base
        run: flake8 src/jobs/ airflow/dags/

      - name: Execute Local PySpark Tests
        run: pytest tests/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform

  deploy-to-aws:
    name: Secure Cloud Sync
    needs: validate-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate via AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy PySpark Artifacts to S3 Lake
        run: |
          aws s3 sync src/jobs/ s3://${{ vars.S3_CODE_BUCKET }}/jobs/ --delete

      - name: Deploy Cloud Orchestration to Airflow DAGs
        run: |
          aws s3 sync airflow/dags/ s3://${{ vars.S3_AIRFLOW_DAGS_BUCKET }}/dags/ --delete